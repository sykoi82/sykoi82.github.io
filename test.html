<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc,
         updateDoc, deleteDoc, orderBy, query,
         serverTimestamp, onSnapshot }
                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword,
         signOut, onAuthStateChanged }
                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ════════════════════════════════════════════════
// 🔧 CẤU HÌNH — chỉnh sửa tại đây
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBiWZSz674nfh3cu12dDPv47YVHI5o5fjg",
  authDomain:        "st82-f333b.firebaseapp.com",
  projectId:         "st82-f333b",
  storageBucket:     "st82-f333b.firebasestorage.app",
  messagingSenderId: "136813956513",
  appId:             "1:136813956513:web:fd5ea81e019274f0d08fe0"
};

const IMGBB_API_KEY = "YOUR_IMGBB_API_KEY"; // ← API key ImgBB

const PROFILE = {
  name:     "Nhật ký cá nhân",
  tagline:  "Ghi lại những suy nghĩ, kinh nghiệm và kiến thức trong cuộc sống.",
  avatar:   "",       // URL ảnh — để trống = dùng chữ viết tắt
  initials: "NK",
  links:    [
    // { label:"Facebook", url:"https://facebook.com/..." },
    // { label:"Email",    url:"mailto:abc@gmail.com"    },
  ]
};
// ════════════════════════════════════════════════

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);
const col  = collection(db, "posts");

// ── STATE ────────────────────────────────────────
let posts       = [];
let postsLoaded = false;
let currentUser = null;
let view        = "home";
let activeId    = null;
let editId      = null;
let draft       = { title:"", content:"", tags:"", images:[] };
let autoTimer   = null;
let searchQuery = "";

// ── DARK MODE ────────────────────────────────────
const isDark  = () => document.documentElement.classList.contains("dark");
function toggleTheme() {
  const d = !isDark();
  document.documentElement.classList.toggle("dark", d);
  localStorage.setItem("theme", d ? "dark" : "light");
  render();
}

// ── AUTH ─────────────────────────────────────────
onAuthStateChanged(auth, user => { currentUser = user; render(); });

// ── FIRESTORE — realtime ─────────────────────────
onSnapshot(query(col, orderBy("createdAt","desc")), snap => {
  posts = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  postsLoaded = true;
  render();
}, err => {
  postsLoaded = true;
  if (err.code === "permission-denied")
    alert("Firestore Rules chưa cấu hình. Vui lòng kiểm tra lại.");
  render();
});

// ── CRUD ─────────────────────────────────────────
async function savePost() {
  const ts   = serverTimestamp();
  const data = { title:draft.title, content:draft.content,
                 tags:draft.tags, images:draft.images||[], updatedAt:ts };
  if (editId) await updateDoc(doc(db,"posts",editId), data);
  else        await addDoc(col, { ...data, createdAt:ts });
  localStorage.removeItem("blog_draft");
  draft  = { title:"", content:"", tags:"", images:[] };
  editId = null;
  setView("home");
}

async function deletePost(id) {
  await deleteDoc(doc(db,"posts",id));
  if (view==="post") setView("home"); else render();
}

// ── IMAGE UPLOAD (ImgBB) ─────────────────────────
function uploadImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const bar  = document.getElementById("prog-fill");
        const wrap = document.getElementById("prog-bar");
        if (wrap) wrap.style.display = "block";
        if (bar)  bar.style.width    = "40%";

        const fd = new FormData();
        fd.append("key",   IMGBB_API_KEY);
        fd.append("image", reader.result.split(",")[1]);

        const res  = await fetch("https://api.imgbb.com/1/upload", { method:"POST", body:fd });
        const data = await res.json();

        if (bar) bar.style.width = "100%";
        setTimeout(() => {
          if (wrap) wrap.style.display = "none";
          if (bar)  bar.style.width    = "0%";
        }, 400);

        if (data.success) resolve(data.data.url);
        else reject(new Error(data.error?.message || "Upload thất bại"));
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImages(files) {
  const st = document.getElementById("upload-status");
  if (st) st.textContent = "Đang tải ảnh…";
  try {
    for (const f of files) {
      if (!f.type.startsWith("image/")) continue;
      const url = await uploadImage(f);
      draft.images = [...(draft.images||[]), url];
      const ta  = document.getElementById("inp-content");
      if (ta) {
        const mk  = `\n@@IMG:${url}@@\n`;
        const pos = ta.selectionStart ?? ta.value.length;
        ta.value  = ta.value.slice(0,pos) + mk + ta.value.slice(pos);
        draft.content = ta.value;
      }
      renderPreviews();
    }
    if (st) { st.textContent = "✓ Đã chèn ảnh"; setTimeout(()=>{ if(st) st.textContent=""; },2000); }
  } catch(e) { if (st) st.textContent = "Lỗi: " + e.message; }
}

function renderPreviews() {
  const g = document.getElementById("img-preview-grid");
  if (!g) return;
  g.innerHTML = (draft.images||[]).map((u,i) => `
    <div class="img-preview-item">
      <img src="${esc(u)}" alt="img"/>
      <button class="rm-img" data-i="${i}">✕</button>
    </div>`).join("");
  g.querySelectorAll(".rm-img").forEach(el => el.addEventListener("click", ev => {
    ev.stopPropagation();
    const i   = +el.dataset.i;
    const url = draft.images[i];
    draft.images.splice(i,1);
    const ta = document.getElementById("inp-content");
    if (ta) { ta.value = ta.value.replace(`\n@@IMG:${url}@@\n`,""); draft.content = ta.value; }
    renderPreviews();
  }));
}

// ── CONTENT RENDERER ─────────────────────────────
function renderContent(text) {
  return (text||"").split(/(@@IMG:[^@]+@@)/g).map(p => {
    const m = p.match(/^@@IMG:(.+)@@$/);
    return m ? `<img src="${esc(m[1])}" class="post-img" loading="lazy" alt="ảnh"/>`
             : `<span>${esc(p)}</span>`;
  }).join("");
}

// ── AUTH ACTIONS ─────────────────────────────────
async function doLogin() {
  const email = do
