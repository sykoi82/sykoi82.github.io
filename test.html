html.dark{

/* ── RESET ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:&#39;DM Sans&#39;,system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;line-height:1.5}
textarea,input{font-family:inherit;background:transparent;border:none;outline:none;color:var(--fg)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
::placeholder{color:var(--ph)!important;opacity:1!important}

/* ── LAYOUT ────────────────────────────────────────────────── */
.page{max-width:1152px;margin:0 auto;padding:0 32px}
.page-grid{display:grid;grid-template-columns:260px 1fr;gap:56px}
.main-col{min-height:100vh;padding:40px 0}
.write-col{max-width:720px;margin:0 auto;padding:32px 0 96px}
@media(max-width:1023px){
  .page{padding:0}

.post-view{padding:40px 0 80px}

.img-grid{display:grid;gap:3px;border-radius:10px;overflow:hidden;margin:16px 0}

  document.getElementById(&#34;lbx-next&#34;)?.addEventListener(&#34;click&#34;, () =&gt; lightboxNav(1));
  el.addEventListener(&#34;click&#34;, e =&gt; { if (e.target === el) closeLightbox(); });
}
function closeLightbox() { document.getElementById(&#34;lbx-el&#34;)?.remove(); }
function lightboxNav(d) { lbxIdx = (lbxIdx + d + lbxUrls.length) % lbxUrls.length; showLightbox(); }
document.addEventListener(&#34;keydown&#34;, e =&gt; {
  if (!document.getElementById(&#34;lbx-el&#34;)) return;
  if (e.key === &#34;Escape&#34;) closeLightbox();
  if (e.key === &#34;ArrowLeft&#34;) lightboxNav(-1);
  if (e.key === &#34;ArrowRight&#34;) lightboxNav(1);
});

async function savePost() {

// ── IMAGE UPLOAD (ImgBB) ─────────────────────────
function uploadImage(file) {
  return new Promise((resolve, reject) =&gt; {
    const reader = new FileReader();
    reader.onload = async () =&gt; {
      try {
        const bar  = document.getElementById(&#34;prog-fill&#34;);
        const wrap = document.getElementById(&#34;prog-bar&#34;);
        if (wrap) wrap.style.display = &#34;block&#34;;
        if (bar)  bar.style.width    = &#34;40%&#34;;

        const fd = new FormData();
        fd.append(&#34;key&#34;,   IMGBB_API_KEY);
        fd.append(&#34;image&#34;, reader.result.split(&#34;,&#34;)[1]);

        const res  = await fetch(&#34;https://api.imgbb.com/1/upload&#34;, { method:&#34;POST&#34;, body:fd });
        const data = await res.json();

        if (bar) bar.style.width = &#34;100%&#34;;
        setTimeout(() =&gt; {
          if (wrap) wrap.style.display = &#34;none&#34;;
          if (bar)  bar.style.width    = &#34;0%&#34;;
        }, 400);

        if (data.success) resolve(data.data.url);
        else reject(new Error(data.error?.message || &#34;Upload thất bại&#34;));
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImages(files) {
  const st = document.getElementById(&#34;upload-status&#34;);
  if (st) st.textContent = &#34;Đang tải ảnh…&#34;;
  try {
    for (const f of files) {
      if (!f.type.startsWith(&#34;image/&#34;)) continue;
      const url = await uploadImage(f);
      draft.images = [...(draft.images||[]), url];
      const ta  = document.getElementById(&#34;inp-content&#34;);
      if (ta) {
        const mk  = `\n@@IMG:${url}@@\n`;
        const pos = ta.selectionStart ?? ta.value.length;
        ta.value  = ta.value.slice(0,pos) + mk + ta.value.slice(pos);
        draft.content = ta.value;
      }
      renderPreviews();
    }
    if (st) { st.textContent = &#34;✓ Đã chèn ảnh&#34;; setTimeout(()=&gt;{ if(st) st.textContent=&#34;&#34;; },2000); }
  } catch(e) { if (st) st.textContent = &#34;Lỗi: &#34; + e.message; }
}

function renderPreviews() {
  const g = document.getElementById(&#34;img-preview-grid&#34;);
  if (!g) return;
  g.innerHTML = (draft.images||[]).map((u,i) =&gt; `
    &lt;div class=&#34;img-preview-item&#34;&gt;
      &lt;img src=&#34;${esc(u)}&#34; alt=&#34;img&#34;/&gt;
      &lt;button class=&#34;rm-img&#34; data-i=&#34;${i}&#34;&gt;✕&lt;/button&gt;
    &lt;/div&gt;`).join(&#34;&#34;);
  g.querySelectorAll(&#34;.rm-img&#34;).forEach(el =&gt; el.addEventListener(&#34;click&#34;, ev =&gt; {
    ev.stopPropagation();
    const i   = +el.dataset.i;
    const url = draft.images[i];
    draft.images.splice(i,1);
    const ta = document.getElementById(&#34;inp-content&#34;);
    if (ta) { ta.value = ta.value.replace(`\n@@IMG:${url}@@\n`,&#34;&#34;); draft.content = ta.value; }
    renderPreviews();
  }));
}

// ── CONTENT RENDERER ─────────────────────────────
function renderContent(text) {
  const parts = (text||&#34;&#34;).split(/(@@IMG:[^@]+@@)/g);
  const out = []; let imgBuf = [];
  const flush = () =&gt; { if (!imgBuf.length) return; out.push(renderImgGrid(imgBuf)); imgBuf = []; };
  for (const p of parts) {
    const m = p.match(/^@@IMG:(.+)@@$/);
    if (m) { imgBuf.push(m[1]); } else { flush(); if (p) out.push(&#34;&lt;span&gt;&#34; + esc(p) + &#34;&lt;/span&gt;&#34;); }
  }
  flush();
  return out.join(&#34;&#34;);
}

function renderImgGrid(urls) {
  const n = urls.length;
  const max = Math.min(n, 5), extra = n &gt; 5 ? n - 5 : 0;
  const cls = [&#34;&#34;,&#34;img-grid-1&#34;,&#34;img-grid-2&#34;,&#34;img-grid-3&#34;,&#34;img-grid-4&#34;,&#34;img-grid-5&#34;][max];
  const attr = JSON.stringify(urls).replace(/&amp;/g,&#34;&amp;amp;&#34;).replace(/&#34;/g,&#34;&amp;quot;&#34;).replace(/&lt;/g,&#34;&amp;lt;&#34;).replace(/&gt;/g,&#34;&amp;gt;&#34;);
  const cells = urls.slice(0, max).map((url, i) =&gt; {
    const last = extra &gt; 0 &amp;&amp; i === max - 1;
    return &#34;&lt;div class=&#39;gi&#34; + (last ? &#34; gi-more&#39;&#34; : &#34;&#39;&#34;) + &#34; data-idx=&#39;&#34; + i + &#34;&#39;&#34;
      + (last ? &#34; data-more=&#39;+&#34; + extra + &#34;&#39;&#34; : &#34;&#34;) + &#34;&gt;&lt;img src=&#39;&#34; + esc(url) + &#34;&#39; loading=&#39;lazy&#39; alt=&#39;&#39;/&gt;&lt;/div&gt;&#34;;
  }).join(&#34;&#34;);
  return &#34;&lt;div class=&#39;img-grid &#34; + cls + &#34;&#39; data-urls=&#39;&#34; + attr + &#34;&#39;&gt;&#34; + cells + &#34;&lt;/div&gt;&#34;;
}

async function doLogin() {

  try {

    setView(&#34;home&#34;);
  } catch(e) {
    showErr({ &#34;auth/invalid-credential&#34;:&#34;Email hoặc mật khẩu không đúng.&#34;,
              &#34;auth/user-not-found&#34;:&#34;Tài khoản không tồn tại.&#34;,
              &#34;auth/wrong-password&#34;:&#34;Mật khẩu không đúng.&#34;,

           || &#34;Đăng nhập thất bại.&#34;);

function fmt(ts) {
  if (!ts) return &#34;&#34;;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString(&#34;vi-VN&#34;,{day:&#34;2-digit&#34;,month:&#34;2-digit&#34;,year:&#34;numeric&#34;})
       + &#34; · &#34; + d.toLocaleTimeString(&#34;vi-VN&#34;,{hour:&#34;2-digit&#34;,minute:&#34;2-digit&#34;});
}
function tagList(s) { return (s||&#34;&#34;).split(&#34;,&#34;).map(t=&gt;t.trim()).filter(Boolean); }
function esc(s) {
  return String(s||&#34;&#34;).replace(/&amp;/g,&#34;&amp;amp;&#34;).replace(/&lt;/g,&#34;&amp;lt;&#34;)
                      .replace(/&gt;/g,&#34;&amp;gt;&#34;).replace(/&#34;/g,&#34;&amp;quot;&#34;);
}
function filtered() {
  if (!searchQuery) return posts;
  const q = searchQuery.toLowerCase();
  return posts.filter(p =&gt;
    p.title?.toLowerCase().includes(q) ||
    p.content?.toLowerCase().includes(q) ||
    (p.tags||&#34;&#34;).toLowerCase().includes(q));
}

      ${[1,2,3].map(()=&gt;`
        &lt;div class=&#34;skel-item&#34;&gt;
          &lt;div class=&#34;skel&#34; style=&#34;height:12px;width:120px;margin-bottom:10px&#34;&gt;&lt;/div&gt;
          &lt;div class=&#34;skel&#34; style=&#34;height:18px;width:70%;margin-bottom:8px&#34;&gt;&lt;/div&gt;
          &lt;div class=&#34;skel&#34; style=&#34;height:13px;width:100%;margin-bottom:5px&#34;&gt;&lt;/div&gt;
          &lt;div class=&#34;skel&#34; style=&#34;height:13px;width:80%&#34;&gt;&lt;/div&gt;
        &lt;/div&gt;`).join(&#34;&#34;)}
    &lt;/div&gt;`;

  const list = filtered();

  if (searchQuery &amp;&amp; !list.length) return `
    &lt;div class=&#34;empty&#34;&gt;
      &lt;div class=&#34;empty-ico&#34;&gt;🔍&lt;/div&gt;
      &lt;p style=&#34;font-size:.88rem&#34;&gt;Không tìm thấy &#34;&lt;strong&gt;${esc(searchQuery)}&lt;/strong&gt;&#34;&lt;/p&gt;
      &lt;button id=&#34;clear-search&#34; class=&#34;btn btn-g btn-sm&#34; style=&#34;margin-top:14px&#34;&gt;Xoá tìm kiếm&lt;/button&gt;
    &lt;/div&gt;`;

  if (!list.length) return `
    &lt;div class=&#34;empty&#34;&gt;
      &lt;div class=&#34;empty-ico&#34;&gt;✍️&lt;/div&gt;
      &lt;p style=&#34;font-size:.88rem&#34;&gt;Chưa có bài viết nào.&lt;/p&gt;
    &lt;/div&gt;`;

  return `
    ${searchQuery ? `&lt;p class=&#34;search-lbl&#34;&gt;Kết quả: &lt;strong style=&#34;color:var(--fg)&#34;&gt;${esc(searchQuery)}&lt;/strong&gt; — ${list.length} bài&lt;/p&gt;` : &#34;&#34;}
    &lt;div class=&#34;post-list&#34;&gt;
      ${list.map(p =&gt; {
        const thumb = (p.images||[]).find(Boolean);
        return `
        &lt;article class=&#34;post-card&#34; data-id=&#34;${esc(p.id)}&#34;&gt;
          &lt;div class=&#34;pc-row&#34;&gt;
            &lt;div class=&#34;pc-body&#34;&gt;
              &lt;div class=&#34;pc-date&#34;&gt;${esc(fmt(p.createdAt))}&lt;/div&gt;
              &lt;h2 class=&#34;pc-title&#34;&gt;${esc(p.title)}&lt;/h2&gt;
              &lt;p class=&#34;pc-excerpt&#34;&gt;${esc((p.content||&#34;&#34;).replace(/@@IMG:[^@]+@@/g,&#34;&#34;).slice(0,180))}&lt;/p&gt;
              ${tagList(p.tags).length ? `
                &lt;div class=&#34;pc-tags&#34;&gt;
                  ${tagList(p.tags).map(t=&gt;`&lt;span class=&#34;tag&#34;&gt;${esc(t)}&lt;/span&gt;`).join(&#34;&#34;)}
                &lt;/div&gt;` : &#34;&#34;}
            &lt;/div&gt;
            ${thumb ? `&lt;img src=&#34;${esc(thumb)}&#34; class=&#34;pc-thumb&#34; loading=&#34;lazy&#34; alt=&#34;&#34;/&gt;` : &#34;&#34;}
          &lt;/div&gt;
        &lt;/article&gt;`;}).join(&#34;&#34;)}
    &lt;/div&gt;
    &lt;div class=&#34;post-count&#34;&gt;${posts.length} bài viết&lt;/div&gt;`;
}

// ── POST VIEW ─────────────────────────────────────
function tPost() {
  const p = posts.find(x=&gt;x.id===activeId);
  if (!p) return tHome();
  return `
    &lt;div class=&#34;post-view&#34;&gt;
      &lt;button id=&#34;go-back&#34; class=&#34;back-btn&#34;&gt;${ICO.back} Trang chủ&lt;/button&gt;
      &lt;div class=&#34;pv-date&#34;&gt;${esc(fmt(p.createdAt))}&lt;/div&gt;
      &lt;h1 class=&#34;pv-title&#34;&gt;${esc(p.title)}&lt;/h1&gt;
      ${tagList(p.tags).length ? `
        &lt;div class=&#34;pv-tags&#34;&gt;${tagList(p.tags).map(t=&gt;`&lt;span class=&#34;tag&#34;&gt;${esc(t)}&lt;/span&gt;`).join(&#34;&#34;)}&lt;/div&gt;` : &#34;&#34;}
      &lt;hr class=&#34;pv-rule&#34;/&gt;
      &lt;div class=&#34;pv-body&#34;&gt;${renderContent(p.content)}&lt;/div&gt;
      ${currentUser ? `
        &lt;div class=&#34;pv-actions&#34;&gt;
          &lt;button id=&#34;go-edit&#34; data-id=&#34;${esc(p.id)}&#34; class=&#34;btn btn-g&#34;&gt;${ICO.edit} Chỉnh sửa&lt;/button&gt;
          &lt;button id=&#34;go-delete&#34; data-id=&#34;${esc(p.id)}&#34; class=&#34;btn btn-danger&#34;&gt;${ICO.trash} Xoá bài&lt;/button&gt;
        &lt;/div&gt;` : &#34;&#34;}
    &lt;/div&gt;`;
}

// ── WRITE ─────────────────────────────────────────
function tWrite() {
  return `
    &lt;div class=&#34;wr-topbar&#34;&gt;
      &lt;span class=&#34;wr-label&#34;&gt;${editId?&#34;Chỉnh sửa bài&#34;:&#34;Bài viết mới&#34;}&lt;/span&gt;
      &lt;span id=&#34;save-status&#34; class=&#34;wr-save&#34;&gt;&lt;/span&gt;
    &lt;/div&gt;

    &lt;textarea id=&#34;inp-title&#34; class=&#34;wr-title&#34; rows=&#34;1&#34;
      placeholder=&#34;Tiêu đề bài viết…&#34;&gt;${esc(draft.title)}&lt;/textarea&gt;

    &lt;input id=&#34;inp-tags&#34; class=&#34;wr-tags&#34; type=&#34;text&#34;
      placeholder=&#34;Thẻ tag (phẩy ngăn cách): y học, tim mạch…&#34;
      value=&#34;${esc(draft.tags)}&#34;/&gt;

    &lt;div class=&#34;img-toolbar&#34;&gt;
      &lt;div class=&#34;img-tb-hdr&#34;&gt;
        &lt;span class=&#34;img-tb-lbl&#34;&gt;Chèn ảnh&lt;/span&gt;
        &lt;label class=&#34;img-file-label btn btn-g btn-sm&#34;&gt;
          ${ICO.img} Chọn ảnh
          &lt;input id=&#34;img-file-input&#34; type=&#34;file&#34; accept=&#34;image/*&#34; multiple style=&#34;display:none&#34;/&gt;
        &lt;/label&gt;
        &lt;span id=&#34;upload-status&#34; style=&#34;font-size:.75rem;color:var(--fg3)&#34;&gt;&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&#34;img-tb-body&#34;&gt;
        &lt;div class=&#34;progress-bar&#34; id=&#34;prog-bar&#34; style=&#34;display:none&#34;&gt;
          &lt;div class=&#34;progress-fill&#34; id=&#34;prog-fill&#34; style=&#34;width:0%&#34;&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&#34;img-preview-grid&#34; id=&#34;img-preview-grid&#34;&gt;
          ${(draft.images||[]).map((u,i)=&gt;`
            &lt;div class=&#34;img-preview-item&#34;&gt;
              &lt;img src=&#34;${esc(u)}&#34; alt=&#34;img&#34;/&gt;
              &lt;button class=&#34;rm-img&#34; data-i=&#34;${i}&#34;&gt;✕&lt;/button&gt;
            &lt;/div&gt;`).join(&#34;&#34;)}
        &lt;/div&gt;
        ${!(draft.images||[]).length
          ? `&lt;p style=&#34;font-size:.75rem;color:var(--fg3)&#34;&gt;Ảnh sẽ chèn vào vị trí con trỏ trong nội dung&lt;/p&gt;` : &#34;&#34;}
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;textarea id=&#34;inp-content&#34; class=&#34;wr-content&#34;
      placeholder=&#34;Bắt đầu viết nội dung của bạn…&amp;#10;&amp;#10;Tự động lưu nháp mỗi lúc bạn gõ.&#34;
    &gt;${esc(draft.content)}&lt;/textarea&gt;`;
}

// ── LOGIN ─────────────────────────────────────────
function tLogin() {
  return `
    &lt;div class=&#34;login-page&#34;&gt;
      &lt;div class=&#34;login-card&#34;&gt;
        &lt;div class=&#34;login-avatar-wrap&#34;&gt;
          &lt;div class=&#34;login-av&#34;&gt;
            &lt;span&gt;${esc(PROFILE.initials)}&lt;/span&gt;
          &lt;/div&gt;
          &lt;h1 class=&#34;login-h&#34;&gt;Đăng nhập&lt;/h1&gt;
          &lt;p class=&#34;login-sub&#34;&gt;Tài khoản quản trị viên&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&#34;login-box&#34;&gt;
          &lt;div id=&#34;login-error&#34; class=&#34;login-err&#34; style=&#34;display:none&#34;&gt;&lt;/div&gt;
          &lt;div class=&#34;form-group&#34;&gt;
            &lt;label class=&#34;form-label&#34;&gt;Email&lt;/label&gt;
            &lt;input id=&#34;inp-email&#34; class=&#34;form-input&#34; type=&#34;email&#34;
              autocomplete=&#34;email&#34; placeholder=&#34;admin@example.com&#34;/&gt;
          &lt;/div&gt;
          &lt;div class=&#34;form-group&#34;&gt;
            &lt;label class=&#34;form-label&#34;&gt;Mật khẩu&lt;/label&gt;
            &lt;input id=&#34;inp-pw&#34; class=&#34;form-input&#34; type=&#34;password&#34;
              autocomplete=&#34;current-password&#34; placeholder=&#34;••••••••&#34;/&gt;
          &lt;/div&gt;
          &lt;button id=&#34;login-btn&#34; class=&#34;btn btn-p btn-full&#34; style=&#34;margin-top:8px&#34;&gt;Đăng nhập&lt;/button&gt;
          &lt;button id=&#34;back-from-login&#34; class=&#34;btn btn-g btn-full&#34; style=&#34;margin-top:8px&#34;&gt;← Quay lại&lt;/button&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;`;
}

// ── BIND ──────────────────────────────────────────
function bind() {
  const on = (id, ev, fn) =&gt; document.getElementById(id)?.addEventListener(ev, fn);

  on(&#34;go-home&#34;,         &#34;click&#34;, () =&gt; { searchQuery=&#34;&#34;; setView(&#34;home&#34;); });
  on(&#34;go-back&#34;,         &#34;click&#34;, () =&gt; setView(&#34;home&#34;));
  on(&#34;go-login&#34;,        &#34;click&#34;, () =&gt; setView(&#34;login&#34;));
  on(&#34;go-login-side&#34;,   &#34;click&#34;, () =&gt; setView(&#34;login&#34;));
  on(&#34;back-from-login&#34;, &#34;click&#34;, () =&gt; setView(&#34;home&#34;));
  on(&#34;go-logout&#34;,       &#34;click&#34;, () =&gt; { signOut(auth); setView(&#34;home&#34;); });
  on(&#34;go-logout-m&#34;,     &#34;click&#34;, () =&gt; { signOut(auth); setView(&#34;home&#34;); });
  on(&#34;clear-search&#34;,    &#34;click&#34;, () =&gt; { searchQuery=&#34;&#34;; render(); });
  on(&#34;theme-toggle&#34;,    &#34;click&#34;, toggleTheme);
  on(&#34;theme-toggle-d&#34;,  &#34;click&#34;, toggleTheme);

  const openWrite = () =&gt; {
    const s = localStorage.getItem(&#34;blog_draft&#34;);
    draft   = s ? JSON.parse(s) : { title:&#34;&#34;, content:&#34;&#34;, tags:&#34;&#34;, images:[] };
    if (!draft.images) draft.images = [];
    editId  = null;
    setView(&#34;write&#34;);
  };
  on(&#34;go-write&#34;,   &#34;click&#34;, openWrite);
  on(&#34;go-write-m&#34;, &#34;click&#34;, openWrite);

  // Search
  [&#34;search-d&#34;,&#34;search-m&#34;].forEach(id =&gt; {
    document.getElementById(id)?.addEventListener(&#34;input&#34;, e =&gt; {
      searchQuery = e.target.value;
      const list  = filtered();
      // Re-render chỉ vùng post list thay vì toàn trang
      const main  = document.querySelector(&#34;.main-col&#34;);
      if (main) { main.innerHTML = tHome(); bindList(); }
      setTimeout(() =&gt; document.getElementById(id)?.focus(), 5);
    });
  });

  // Tag filter
  document.querySelectorAll(&#34;.tag-btn&#34;).forEach(el =&gt;
    el.addEventListener(&#34;click&#34;, () =&gt; { searchQuery = el.dataset.tag; render(); }));

  bindList();

  // Grid lightbox click
  document.querySelectorAll(&#34;.img-grid&#34;).forEach(grid =&gt; {
    grid.querySelectorAll(&#34;.gi&#34;).forEach(gi =&gt; {
      gi.addEventListener(&#34;click&#34;, () =&gt; {
        try {
          const urls = JSON.parse(grid.getAttribute(&#34;data-urls&#34;));
          openLightbox(urls, +gi.dataset.idx);
        } catch(e) {}
      });
    });
  });

  // Write
  on(&#34;cancel-write&#34;,&#34;click&#34;, () =&gt; { setView(&#34;home&#34;); editId=null; });
  on(&#34;publish-btn&#34;, &#34;click&#34;, async () =&gt; {
    const t = document.getElementById(&#34;inp-title&#34;)?.value.trim();
    const c = document.getElementById(&#34;inp-content&#34;)?.value.trim();
    if (!t||!c) { alert(&#34;Vui lòng nhập tiêu đề và nội dung.&#34;); return; }
    draft.title   = t; draft.content = c;
    draft.tags    = document.getElementById(&#34;inp-tags&#34;)?.value||&#34;&#34;;
    const btn = document.getElementById(&#34;publish-btn&#34;);
    if (btn) { btn.disabled=true; btn.textContent=&#34;Đang lưu…&#34;; }
    try { await savePost(); }
    catch(e) { alert(&#34;Lỗi: &#34;+e.message); if(btn){btn.disabled=false; btn.textContent=editId?&#34;Lưu thay đổi&#34;:&#34;Đăng bài&#34;;} }
  });

  on(&#34;img-file-input&#34;,&#34;change&#34;, async e =&gt; {
    if (e.target.files?.length) await handleImages(Array.from(e.target.files));
  });

  document.querySelectorAll(&#34;.rm-img&#34;).forEach(el =&gt; el.addEventListener(&#34;click&#34;, ev =&gt; {
    ev.stopPropagation();
    const i   = +el.dataset.i;
    const url = draft.images[i];
    draft.images.splice(i,1);
    const ta = document.getElementById(&#34;inp-content&#34;);
    if (ta) { ta.value = ta.value.replace(`\n@@IMG:${url}@@\n`,&#34;&#34;); draft.content=ta.value; }
    renderPreviews();
  }));

  [&#34;inp-title&#34;,&#34;inp-content&#34;,&#34;inp-tags&#34;].forEach(id =&gt; {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener(&#34;input&#34;, () =&gt; {
      draft.title   = document.getElementById(&#34;inp-title&#34;)?.value   ?? draft.title;
      draft.content = document.getElementById(&#34;inp-content&#34;)?.value ?? draft.content;
      draft.tags    = document.getElementById(&#34;inp-tags&#34;)?.value    ?? draft.tags;
      scheduleSave();
    });
    if (id===&#34;inp-title&#34;) {
      el.style.height = &#34;auto&#34;; el.style.height = el.scrollHeight+&#34;px&#34;;
      el.addEventListener(&#34;input&#34;,()=&gt;{el.style.height=&#34;auto&#34;; el.style.height=el.scrollHeight+&#34;px&#34;;});
    }
  });

  on(&#34;login-btn&#34;,&#34;click&#34;, doLogin);
  on(&#34;inp-pw&#34;,&#34;keydown&#34;, e =&gt; { if(e.key===&#34;Enter&#34;) doLogin(); });
  setTimeout(() =&gt; {
    document.getElementById(&#34;inp-email&#34;)?.focus();
    document.getElementById(&#34;inp-title&#34;)?.focus();
  }, 20);
}

function bindList() {
  document.querySelectorAll(&#34;.post-card&#34;).forEach(el =&gt;
    el.addEventListener(&#34;click&#34;, () =&gt; setView(&#34;post&#34;, el.dataset.id)));

  const on = (id, ev, fn) =&gt; document.getElementById(id)?.addEventListener(ev, fn);
  on(&#34;go-edit&#34;, &#34;click&#34;, e =&gt; {
    const p = posts.find(x=&gt;x.id===e.currentTarget.dataset.id);
    if (p) { draft={title:p.title,content:p.content,tags:p.tags||&#34;&#34;,images:p.images||[]}; editId=p.id; setView(&#34;edit&#34;); }
  });
  on(&#34;go-delete&#34;,&#34;click&#34;, e =&gt; {
    if (confirm(&#34;Xoá bài viết này? Không thể hoàn tác.&#34;)) deletePost(e.currentTarget.dataset.id);
  });
}
    </script>
  </head>
  <body>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--fg3);font-size:.9rem">
      Đang kết nối…
    </div>
  </body>
</html>
